backend:
  name: git-gateway
  branch: master

media_folder: "public/img"
public_folder: "/img"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home Page"
        file: "src/content/home.json"
        fields:
          - {label: "Hero Section", name: "hero", widget: "object", fields: [
              {label: "Main Heading", name: "heading", widget: "string"},
              {label: "Subheading Paragraph", name: "subheading", widget: "text"},
              {label: "Footer Note", name: "footerNote", widget: "string"}
            ]}
          - {label: "Target Audiences", name: "audiences", widget: "object", fields: [
              {label: "Eyebrow Text", name: "eyebrow", widget: "string"},
              {label: "Section Title", name: "title", widget: "string"},
              {label: "Section Subtitle", name: "subtitle", widget: "string"}
            ]}
          - {label: "Partnership Section", name: "partnership", widget: "object", fields: [
              {label: "Eyebrow Text", name: "eyebrow", widget: "string"},
              {label: "Section Title", name: "title", widget: "string"},
              {label: "Subtitle Paragraph", name: "subtitle", widget: "text"}
            ]}
      - name: "studio"
        label: "Studio Page"
        file: "src/content/studio.json"
        fields:
          - {label: "Hero Section", name: "hero", widget: "object", fields: [
              {label: "Eyebrow Text", name: "eyebrow", widget: "string"},
              {label: "Title", name: "title", widget: "string"},
              {label: "Subheading", name: "subheading", widget: "text"},
              {label: "Button Text", name: "buttonText", widget: "string"},
              {label: "Badge Tag", name: "badgeTag", widget: "string"},
              {label: "Badge Value", name: "badgeValue", widget: "string"},
              {label: "Badge Label", name: "badgeLabel", widget: "string"}
            ]}
          - {label: "Validation Section", name: "validation", widget: "object", fields: [
              {label: "Title", name: "title", widget: "string"},
              {label: "Description", name: "description", widget: "text"},
              {label: "Button Text", name: "buttonText", widget: "string"},
              {label: "Score Label", name: "scoreLabel", widget: "string"},
              {label: "Score Value", name: "scoreValue", widget: "string"},
              {label: "Market Fit Label", name: "marketFitLabel", widget: "string"},
              {label: "Market Fit Value", name: "marketFitValue", widget: "string"},
              {label: "Tech Feasibility Label", name: "techFeasibilityLabel", widget: "string"},
              {label: "Tech Feasibility Value", name: "techFeasibilityValue", widget: "string"},
              {label: "GTM Strategy Label", name: "gtmStrategyLabel", widget: "string"},
              {label: "GTM Strategy Value", name: "gtmStrategyValue", widget: "string"},
              {label: "Growth Badge", name: "growthBadge", widget: "string"}
            ]}
          - {label: "Founders & Investors Section", name: "foundersInvestors", widget: "object", fields: [
              {label: "Section Title", name: "title", widget: "string"},
              {label: "Founders Card", name: "founders", widget: "object", fields: [
                {label: "Title", name: "title", widget: "string"},
                {label: "Description", name: "description", widget: "text"},
                {label: "Benefits", name: "benefits", widget: "list", field: {label: "Benefit", name: "benefit", widget: "string"}},
                {label: "Button Text", name: "buttonText", widget: "string"}
              ]},
              {label: "Investors Card", name: "investors", widget: "object", fields: [
                {label: "Title", name: "title", widget: "string"},
                {label: "Description", name: "description", widget: "text"},
                {label: "Benefits", name: "benefits", widget: "list", field: {label: "Benefit", name: "benefit", widget: "string"}},
                {label: "Button Text", name: "buttonText", widget: "string"}
              ]}
            ]}
          - {label: "Partnership Section", name: "partnership", widget: "object", fields: [
              {label: "Section Title", name: "title", widget: "string"},
              {label: "Support Card", name: "support", widget: "object", fields: [
                {label: "Title", name: "title", widget: "string"},
                {label: "Description", name: "description", widget: "text"},
                {label: "Best For", name: "bestFor", widget: "text"},
                {label: "Button Text", name: "buttonText", widget: "string"}
              ]},
              {label: "Co-Development Card", name: "codevelopment", widget: "object", fields: [
                {label: "Title", name: "title", widget: "string"},
                {label: "Description", name: "description", widget: "text"},
                {label: "Best For", name: "bestFor", widget: "text"},
                {label: "Button Text", name: "buttonText", widget: "string"}
              ]},
              {label: "Full Build Card", name: "fullBuild", widget: "object", fields: [
                {label: "Title", name: "title", widget: "string"},
                {label: "Description", name: "description", widget: "text"},
                {label: "Best For", name: "bestFor", widget: "text"},
                {label: "Button Text", name: "buttonText", widget: "string"}
              ]}
            ]}
          - {label: "Solving Section", name: "solving", widget: "object", fields: [
              {label: "Title", name: "title", widget: "string"},
              {label: "Caption", name: "caption", widget: "string"},
              {label: "Cards", name: "cards", widget: "list", fields: [
                {label: "Title", name: "title", widget: "string"},
                {label: "Problem Description", name: "problemDesc", widget: "text"},
                {label: "Solution Description", name: "solutionDesc", widget: "text"}
              ]}
            ]}
          - {label: "Why Ideas Fail Section", name: "whyIdeasFail", widget: "object", fields: [
              {label: "Title", name: "title", widget: "string"},
              {label: "Description", name: "description", widget: "text"},
              {label: "Problems", name: "problems", widget: "list", fields: [
                {label: "Title", name: "title", widget: "string"},
                {label: "Description", name: "description", widget: "text"}
              ]}
            ]}
          - {label: "What We Look For Section", name: "whatWeLookFor", widget: "object", fields: [
              {label: "Title", name: "title", widget: "string"},
              {label: "Subtitle", name: "subtitle", widget: "text"},
              {label: "Criteria", name: "criteria", widget: "list", fields: [
                {label: "Title", name: "title", widget: "string"},
                {label: "Description", name: "description", widget: "text"}
              ]}
            ]}
          - {label: "Timeline Section", name: "timeline", widget: "object", fields: [
              {label: "Title", name: "title", widget: "string"},
              {label: "Subtitle", name: "subtitle", widget: "text"},
              {label: "Phases", name: "phases", widget: "list", fields: [
                {label: "Phase", name: "phase", widget: "string"},
                {label: "Duration", name: "duration", widget: "string"},
                {label: "Title", name: "title", widget: "string"},
                {label: "Description", name: "description", widget: "text"}
              ]},
              {label: "Stats", name: "stats", widget: "list", fields: [
                {label: "Value", name: "value", widget: "string"},
                {label: "Label", name: "label", widget: "string"}
              ]}
            ]}
          - {label: "FAQ Section", name: "faq", widget: "object", fields: [
              {label: "Title", name: "title", widget: "string"},
              {label: "FAQ Items", name: "items", widget: "list", fields: [
                {label: "Question", name: "question", widget: "string"},
                {label: "Answer", name: "answer", widget: "text"}
              ]}
            ]}
          - {label: "CTA Section", name: "cta", widget: "object", fields: [
              {label: "Title", name: "title", widget: "string"},
              {label: "Subtitle", name: "subtitle", widget: "text"},
              {label: "Button Text", name: "buttonText", widget: "string"}
            ]}
          - {label: "Footer", name: "footer", widget: "object", fields: [
              {label: "Logo", name: "logo", widget: "string"},
              {label: "Description", name: "description", widget: "text"},
              {label: "Company", name: "company", widget: "object", fields: [
                {label: "Heading", name: "heading", widget: "string"},
                {label: "Links", name: "links", widget: "list", field: {label: "Link", name: "link", widget: "string"}}
              ]},
              {label: "Services", name: "services", widget: "object", fields: [
                {label: "Heading", name: "heading", widget: "string"},
                {label: "Links", name: "links", widget: "list", field: {label: "Link", name: "link", widget: "string"}}
              ]},
              {label: "Connect", name: "connect", widget: "object", fields: [
                {label: "Heading", name: "heading", widget: "string"}
              ]}
            ]}
      - name: "careers"
        label: "Careers Page"
        file: "src/content/careers.json"
        fields:
          - {label: "Hero Section", name: "hero", widget: "object", fields: [
              {label: "Eyebrow Text", name: "eyebrow", widget: "string"},
              {label: "Title", name: "title", widget: "string"},
              {label: "Subheading", name: "subheading", widget: "text"},
              {label: "View Openings Button", name: "viewOpeningsButton", widget: "string"},
              {label: "Our Mission Button", name: "ourMissionButton", widget: "string"}
            ]}
          - {label: "Values Section", name: "values", widget: "object", fields: [
              {label: "Section Title", name: "title", widget: "string"},
              {label: "Section Subtitle", name: "subtitle", widget: "text"},
              {label: "Values", name: "values", widget: "list", fields: [
                {label: "Title", name: "title", widget: "string"},
                {label: "Description", name: "description", widget: "text"}
              ]}
            ]}
          - {label: "Departments Section", name: "departments", widget: "object", fields: [
              {label: "Section Title", name: "title", widget: "string"},
              {label: "Departments", name: "departments", widget: "list", field: {label: "Department", name: "department", widget: "string"}}
            ]}
          - {label: "Talent Pool Section", name: "talentPool", widget: "object", fields: [
              {label: "Title", name: "title", widget: "string"},
              {label: "Subtitle", name: "subtitle", widget: "text"},
              {label: "Form", name: "form", widget: "object", fields: [
                {label: "Name Label", name: "nameLabel", widget: "string"},
                {label: "Email Label", name: "emailLabel", widget: "string"},
                {label: "Role Label", name: "roleLabel", widget: "string"},
                {label: "LinkedIn Label", name: "linkedinLabel", widget: "string"},
                {label: "Button Text", name: "buttonText", widget: "string"},
                {label: "Success Message", name: "successMessage", widget: "text"}
              ]}
            ]}
          - {label: "CTA Section", name: "cta", widget: "object", fields: [
              {label: "Title", name: "title", widget: "string"},
              {label: "Subtitle", name: "subtitle", widget: "text"},
              {label: "Button Text", name: "buttonText", widget: "string"}
            ]}
      - name: "faq"
        label: "FAQ Page"
        file: "src/content/faq.json"
        fields:
          - {label: "Hero Section", name: "hero", widget: "object", fields: [
              {label: "Eyebrow Text", name: "eyebrow", widget: "string"},
              {label: "Title", name: "title", widget: "string"},
              {label: "Subheading", name: "subheading", widget: "text"},
              {label: "Button Text", name: "buttonText", widget: "string"}
            ]}
          - {label: "Tabs", name: "tabs", widget: "list", field: {label: "Tab", name: "tab", widget: "string"}}
          - {label: "Categories", name: "categories", widget: "object", fields: [
              {label: "Engagement", name: "engagement", widget: "object", fields: [
                {label: "Title", name: "title", widget: "string"},
                {label: "FAQs", name: "faqs", widget: "list", fields: [
                  {label: "Question", name: "question", widget: "string"},
                  {label: "Answer", name: "answer", widget: "text"}
                ]}
              ]},
              {label: "Product", name: "product", widget: "object", fields: [
                {label: "Title", name: "title", widget: "string"},
                {label: "FAQs", name: "faqs", widget: "list", fields: [
                  {label: "Question", name: "question", widget: "string"},
                  {label: "Answer", name: "answer", widget: "text"}
                ]}
              ]},
              {label: "Security", name: "security", widget: "object", fields: [
                {label: "Title", name: "title", widget: "string"},
                {label: "FAQs", name: "faqs", widget: "list", fields: [
                  {label: "Question", name: "question", widget: "string"},
                  {label: "Answer", name: "answer", widget: "text"}
                ]}
              ]}
            ]}
          - {label: "CTA Section", name: "cta", widget: "object", fields: [
              {label: "Title", name: "title", widget: "string"},
              {label: "Subtitle", name: "subtitle", widget: "text"},
              {label: "Button Text", name: "buttonText", widget: "string"}
            ]}
      - name: "contact"
        label: "Contact Page"
        file: "src/content/contact.json"
        fields:
          - {label: "Hero Section", name: "hero", widget: "object", fields: [
              {label: "Eyebrow Text", name: "eyebrow", widget: "string"},
              {label: "Title", name: "title", widget: "string"},
              {label: "Subheading", name: "subheading", widget: "text"},
              {label: "Button Text", name: "buttonText", widget: "string"}
            ]}
          - {label: "Services Section", name: "services", widget: "object", fields: [
              {label: "Title", name: "title", widget: "string"},
              {label: "Subtitle", name: "subtitle", widget: "text"},
              {label: "Services", name: "services", widget: "list", fields: [
                {label: "Title", name: "title", widget: "string"},
                {label: "Description", name: "description", widget: "text"}
              ]}
            ]}
          - {label: "Form Section", name: "form", widget: "object", fields: [
              {label: "Name Label", name: "nameLabel", widget: "string"},
              {label: "Email Label", name: "emailLabel", widget: "string"},
              {label: "Company Label", name: "companyLabel", widget: "string"},
              {label: "Service Label", name: "serviceLabel", widget: "string"},
              {label: "Stage Label", name: "stageLabel", widget: "string"},
              {label: "Message Label", name: "messageLabel", widget: "string"},
              {label: "Button Text", name: "buttonText", widget: "string"},
              {label: "Stages", name: "stages", widget: "list", field: {label: "Stage", name: "stage", widget: "string"}}
            ]}
          - {label: "Contact Info", name: "contactInfo", widget: "object", fields: [
              {label: "Title", name: "title", widget: "string"},
              {label: "Email", name: "email", widget: "string"},
              {label: "Address", name: "address", widget: "string"},
              {label: "Phone", name: "phone", widget: "string"}
            ]}
          - {label: "CTA Section", name: "cta", widget: "object", fields: [
              {label: "Title", name: "title", widget: "string"},
              {label: "Subtitle", name: "subtitle", widget: "text"},
              {label: "Button Text", name: "buttonText", widget: "string"}
            ]}
          - name: "privacy"
            label: "Privacy Policy Page"
            file: "src/content/privacy.json"
            fields:
              - {label: "Page Title", name: "title", widget: "string"},
              - {label: "Last Updated", name: "lastUpdated", widget: "string"},
              - {label: "Sections", name: "sections", widget: "list", fields: [
                  {label: "Number", name: "number", widget: "string"},
                  {label: "Title", name: "title", widget: "string"},
                  {label: "Content", name: "content", widget: "list", field: {label: "Paragraph", name: "paragraph", widget: "text"}},
                  {label: "List Items", name: "listItems", widget: "list", field: {label: "Item", name: "item", widget: "text"}},
                  {label: "Follow Up Content", name: "followUpContent", widget: "list", field: {label: "Paragraph", name: "paragraph", widget: "text"}}
                ]}
          - name: "terms"
            label: "Terms of Use Page"
            file: "src/content/terms.json"
            fields:
              - {label: "Page Title", name: "title", widget: "string"},
              - {label: "Last Updated", name: "lastUpdated", widget: "string"},
              - {label: "Sections", name: "sections", widget: "list", fields: [
                  {label: "Number", name: "number", widget: "string"},
                  {label: "Title", name: "title", widget: "string"},
                  {label: "Content", name: "content", widget: "list", field: {label: "Paragraph", name: "paragraph", widget: "text"}},
                  {label: "Indented Content", name: "indentedContent", widget: "list", field: {label: "Paragraph", name: "paragraph", widget: "text"}},
                  {label: "Highlighted Content", name: "highlightedContent", widget: "text"}
                ]}
              - {label: "Contact Section", name: "contact", widget: "object", fields: [
                  {label: "Title", name: "title", widget: "string"},
                  {label: "Subtitle", name: "subtitle", widget: "string"},
                  {label: "Description", name: "description", widget: "text"},
                  {label: "Button Text", name: "buttonText", widget: "string"}
                ]}
