<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Builder.io Editor</title>
  <script src="https://cdn.builder.io/js/webcomponents@latest"></script>
</head>
<body>
  <div id="builder-root"></div>
  <script>
    // Initialize Builder.io
    window.builder = window.builder || {};
    window.builder.init = function() {
      // Builder.io initialization will be configured here
      // You'll need to add your Builder.io API key
      console.log('Builder.io initialized');
    };
    
    // Load Builder.io SDK
    import('https://cdn.builder.io/js/webcomponents@latest').then(() => {
      console.log('Builder.io SDK loaded');
    });
  </script>
</body>
</html>
